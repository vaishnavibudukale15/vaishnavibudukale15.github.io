.aspx.cs

     int no, d, s = 0, t;
            no = int.Parse(getnum.Text);
            t = no;
            while (no != 0)
            {
                d = no % 10;
                no = no / 10;
                s = s * 10 + d;
            }
            if (s == t)
            {
                res.Text = "Palindrome No.";
            }
            else
            {
                res.Text = "Not a PAlindrome No.";
            }
